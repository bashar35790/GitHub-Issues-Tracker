<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <!-- font awesome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font family link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- stylesheet link -->
    <link rel="stylesheet" href="./style.css" />

    <!-- daisy ui link and tailwind css link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
  </head>
  <body class="bg-[#F8FAFC]">
    <div
      class="container mx-auto text-center py-12 flex items-center justify-center min-h-screen"
    >
      <div class="card bg-base-100 w-full max-w-sm shadow-2xl py-8">
        <div class="hero-content flex-col">
          <div class="text-center lg:text-left">
            <img
              src="./assets/github-logo.png"
              alt="logo"
              class="w-16 mx-auto mb-4"
            />
            <h1 class="text-2xl font-semibold text-center">
              GitHub Issues Tracker
            </h1>
            <p class="text[16px] text-center text-[#64748B]">
              Sign in to manage your issues
            </p>
          </div>
          <!-- form fildset  -->
          <div class="w-full">
            <div class="card-body">
              <fieldset class="fieldset text-left space-y-3">
                <div class="space-y-1">
                  <label class="label text-[#1F2937]">Username</label>
                  <input id="userName"
                    type="text"
                    class="input"
                    placeholder="Enter your username"
                  />
                  <p class="text-[14px] text-[#4A00FF]">Default: admin</p>
                </div>
                <div>
                  <label class="label text-[#1F2937]">Password</label>
                  <input id="password"
                    type="password"
                    class="input"
                    placeholder="Enter your password"
                  />
                  <p class="text-[14px] text-[#4A00FF]">Default: admin123</p>
                </div>

                <button onclick="logIn()" class="btn btn-primary text-[#ffffff]">Login</button>
              </fieldset>

              <!-- bottom divider and demo credentials -->
              <div class="divider">Or</div>
              <p>Demo Credentials:</p>
              <p class="text-[14px] text-[#4A00FF]">
                Username: admin<br />
                Password: admin123
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>


    <script src="./index.js"></script>
  </body>
</html>
