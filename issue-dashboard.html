<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <!-- font awesome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font family link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- stylesheet link -->
    <link rel="stylesheet" href="./style.css" />

    <!-- daisy ui link and tailwind css link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
  </head>
  <body class="bg-[#F8FAFC]">
    <header class="bg-white w-full">
      <nav
        class="max-w-6xl mx-auto py-4 flex flex-col gap-5 md:flex-row items-center justify-between"
      >
        <!-- left side logo and title -->
        <div class="flex gap-1 items-center">
          <img
            src="./assets/github-logo.png"
            alt="logo"
            class="w-9 mx-auto h-9 object-cover"
          />
          <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
        </div>
        <!-- right side search and new issue button -->
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search issues..."
            class="input input-bordered"
            id="input-search"
          />
          <button class="btn btn-primary text-[#FFFFFF]" id="input-btn">
            + New Issue
          </button>
        </div>
      </nav>
    </header>
    <section>
      <div class="max-w-6xl mx-auto py-12 space-y-4">
        <!-- all issues buttons and filter options will be here -->
        <div
          class="p-6 bg-baise-100 rounded-lg shadow-md flex gap-4"
          id="filter-btns"
        >
          <button class="btn btn-primary" id="All">All Issues</button>
          <button class="btn" id="open">Open</button>
          <button class="btn" id="closed">Closed</button>
        </div>

        <!-- issues count and issues list will be here -->

        <div class="bg-baise-100 rounded-lg shadow-md">
          <div
            class="flex flex-col items-center justify-center gap-5 md:flex-row md:justify-between p-6 border-b border-gray-200"
          >
            <div class="flex items-center gap-4 w-fill">
              <div class="bg-[#ECE4FF] p-2.5 rounded-full">
                <img
                  src="./assets/Aperture.png"
                  alt="aperture"
                  class="w-8 h-8 object-cover"
                />
              </div>
              <div>
                <p class="text-2xl font-semibold" id="Number-of-issues">
                  50 Issues
                </p>
                <p>Track and manage your project issues</p>
              </div>
            </div>
            <div class="flex gap-4 w-fit">
              <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div>
                <p>Open</p>
              </div>
              <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
                <p>Closed</p>
              </div>
            </div>
          </div>

          <div
            class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3"
            id="card-container"
          >
            <!-- cards will be here  -->
          </div>
          <section
            id="loading-section"
            class="flex items-center justify-center h-48 hidden"
          >
            <span class="loading loading-bars loading-xl"></span>
          </section>
        </div>
      </div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box space-y-6">
        <div id="modal-container" class="space-y-6"></div>
      </div>
    </dialog>

    <script src="./dashboard-data.js"></script>
  </body>
</html>
