<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <!-- font awesome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font family link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- stylesheet link -->
    <link rel="stylesheet" href="./style.css" />

    <!-- daisy ui link and tailwind css link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
  </head>
  <body class="bg-[#F8FAFC]">
    <header class="bg-white">
      <nav class="container mx-auto py-4 flex items-center justify-between">
        <!-- left side logo and title -->
        <div class="flex gap-1 items-center">
          <img
            src="./assets/github-logo.png"
            alt="logo"
            class="w-9 mx-auto h-9 object-cover"
          />
          <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
        </div>
        <!-- right side search and new issue button -->
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search issues..."
            class="input input-bordered"
          />
          <button class="btn btn-primary text-[#FFFFFF]">+ New Issue</button>
        </div>
      </nav>
    </header>
    <section>
      <div class="max-w-6xl mx-auto py-12 space-y-4">
        <!-- all issues buttons and filter options will be here -->
        <div class="p-6 bg-baise-100 rounded-lg shadow-md flex gap-4">
          <button class="btn btn-primary">All Issues</button>
          <button class="btn">Open</button>
          <button class="btn">Closed</button>
        </div>

        <!-- issues count and issues list will be here -->
        <div class="bg-baise-100 rounded-lg shadow-md">
          <div
            class="flex items-center justify-between p-6 border-b border-gray-200"
          >
            <div class="flex items-center gap-4 w-fill">
              <div class="bg-[#ECE4FF] p-2.5 rounded-full">
                <img
                  src="./assets/Aperture.png"
                  alt="aperture"
                  class="w-8 h-8 object-cover"
                />
              </div>
              <div>
                <p class="text-2xl font-semibold">50 Issues</p>
                <p>Track and manage your project issues</p>
              </div>
            </div>
            <div class="flex gap-4 w-fit">
              <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div>
                <p>Open</p>
              </div>
              <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
                <p>Open</p>
              </div>
            </div>
          </div>

          <div class="p-6">
            <!-- cards will be here  -->
            <div class="w-fit space-y-3 shadow-2xl rounded-lg">
              <!-- card top  -->
              <div class="p-6 space-y-3">
                <!-- issue title and description will be here -->
                <div class="flex justify-between">
                  <img
                    src="./assets/Open-Status.png"
                    alt="Open Status"
                    class="w-7 h-7 object-cover"
                  />
                  <div
                    class="bg-[#FEECEC] px-6 py-1.5 rounded-full text-[#EF4444] text-[12px] font-medium"
                  >
                    HIGH
                  </div>
                </div>
                <div class="space-y-2">
                  <h2 class="text-xl font-semibold mt-2">
                    Fix navigation menu on mobile devices
                  </h2>
                  <p class="text-[#64748B] mt-1">
                    The navigation menu doesn't collapse properly on mobile
                    devices...
                  </p>
                </div>

                <!-- bug and help wanted tags will be here -->
                <div class="flex justify-baseline gap-1 ">
                  <div
                    class="bg-[#FEECEC] px-6 py-1.5 rounded-full text-[#EF4444] text-[12px] font-medium"
                  >
                    <i class="fa-solid fa-bug"></i> BUG
                  </div>
                  <div
                    class="bg-[#FFF8DB] px-6 py-1.5 rounded-full text-[#D97706] text-[12px] font-medium w-fit"
                  >
                    <i class="fa-solid fa-life-ring"></i> HELP WANTED
                  </div>
                </div>
              </div>

              <!-- divider and comment count will be here -->
              <div class="divider"></div>
              
              <!-- bottom part of the card will be here  -->
              <div class="p-6 space-y-3">
                <p class="text-[#64748B] text-[12px] font-normal">#1 by john_doe</p>
                <p class="text-[#64748B] text-[12px] font-normal">1/15/2024</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
